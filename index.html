<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chillox - Taste the Mystery of Asia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #0b3d2e;
            --primary-dark: #051812;
            --accent: #ff6700;
            --accent-hover: #ff8c00;
            --bg-dark: #000000;
            --text-cream: #f0fdf4;
            --text-muted: #a3b8b0;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--bg-dark) 100%);
            color: var(--text-cream);
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--primary-dark); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        ::selection {
            background: rgba(255, 103, 0, 0.3);
            color: var(--text-cream);
        }

        /* Utilities */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .text-glow {
            text-shadow: 0 0 40px rgba(255, 103, 0, 0.3);
        }

        .glass {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 0 2rem;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.5s, backdrop-filter 0.5s;
        }

        .navbar.scrolled {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-cream);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            position: relative;
            transition: color 0.3s;
        }

        .nav-links a:hover { color: var(--text-cream); }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s;
        }

        .nav-links a:hover::after { width: 100%; }

        .btn-primary {
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            background: linear-gradient(45deg, var(--accent), var(--accent-hover));
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 103, 0, 0.4);
        }

        .btn-secondary {
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            background: transparent;
            color: var(--text-cream);
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-cream);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 80px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            padding: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .mobile-menu.active { display: block; }

        .mobile-menu a {
            display: block;
            padding: 1rem 0;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border);
        }

        .mobile-menu a:hover { color: var(--text-cream); }

        .mobile-menu .btn-primary {
            width: 100%;
            margin-top: 1rem;
            text-align: center;
        }

        /* Hero Section */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1766832255363-c9f060ade8b0?w=1920&q=80') center/cover no-repeat;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(5, 24, 18, 0.9) 0%, rgba(0, 0, 0, 0.8) 100%);
        }

        /* Floating Elements */
        .floating-elements {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .float-el {
            position: absolute;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .float-el-1 {
            top: 20%;
            left: 10%;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent), #ff8c00);
            opacity: 0.6;
            filter: blur(2px);
            animation-delay: 0s;
        }

        .float-el-2 {
            top: 60%;
            right: 15%;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), #0a5c44);
            opacity: 0.5;
            filter: blur(2px);
            animation-delay: 1s;
            animation-duration: 7s;
        }

        .float-el-3 {
            top: 15%;
            right: 25%;
            width: 30px;
            height: 30px;
            background: var(--accent);
            opacity: 0.7;
            box-shadow: 0 0 30px rgba(255, 103, 0, 0.6);
            animation-delay: 0.5s;
            animation-duration: 5s;
        }

        .float-el-4 {
            bottom: 30%;
            left: 20%;
            width: 100px;
            height: 100px;
            border: 4px solid rgba(11, 61, 46, 0.3);
            background: transparent;
            animation-delay: 2s;
            animation-duration: 10s;
        }

        .float-el-5 {
            top: 45%;
            left: 5%;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff8c00, var(--accent));
            opacity: 0.5;
            box-shadow: 0 0 20px rgba(255, 103, 0, 0.4);
            animation-delay: 1.5s;
        }

        .float-el-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 103, 0, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(5deg); }
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            padding: 0 2rem;
        }

        .hero-tagline {
            color: var(--accent);
            font-size: 0.875rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeInUp 0.8s 0.2s forwards;
        }

        .hero-title {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeInUp 1s 0.4s forwards;
        }

        .hero-description {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 500px;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeInUp 0.8s 0.6s forwards;
        }

        .hero-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            opacity: 0;
            animation: fadeInUp 0.8s 0.8s forwards;
        }

        .hero-buttons .btn-primary,
        .hero-buttons .btn-secondary {
            padding: 1rem 2rem;
            font-size: 1rem;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            opacity: 0;
            animation: fadeIn 1s 1.5s forwards;
        }

        .scroll-indicator span {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.2em;
        }

        .scroll-indicator i {
            color: var(--accent);
            animation: bounce 2s infinite;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(10px); }
        }

        /* Sections */
        section {
            padding: 6rem 0;
            position: relative;
        }

        .section-label {
            color: var(--accent);
            font-size: 0.875rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .section-description {
            color: var(--text-muted);
            max-width: 600px;
            line-height: 1.7;
        }

        /* About Section */
        .about {
            background: linear-gradient(180deg, var(--bg-dark) 0%, rgba(11, 61, 46, 0.2) 50%, var(--bg-dark) 100%);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 4rem;
            align-items: center;
        }

        @media (min-width: 1024px) {
            .about-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .about-image-wrapper {
            position: relative;
        }

        .about-image {
            border-radius: 80px 0 80px 0;
            overflow: hidden;
            aspect-ratio: 4/5;
        }

        .about-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .about-badge {
            position: absolute;
            bottom: -1.5rem;
            right: -1.5rem;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent), #ff8c00);
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(255, 103, 0, 0.4);
            animation: float 4s ease-in-out infinite;
        }

        .about-badge-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
        }

        .about-badge-text {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: white;
        }

        .about-content {
            padding-left: 2rem;
        }

        .about-text {
            color: var(--text-muted);
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 2.5rem;
        }

        .stat-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            transition: border-color 0.3s;
        }

        .stat-card:hover {
            border-color: rgba(255, 103, 0, 0.3);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 103, 0, 0.1);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1.25rem;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-cream);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Menu Section */
        .menu {
            background: var(--bg-dark);
        }

        .menu-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .menu-header .section-description {
            margin: 0 auto;
        }

        .menu-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 3rem;
        }

        .menu-tab {
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .menu-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-cream);
        }

        .menu-tab.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(255, 103, 0, 0.4);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .menu-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            overflow: hidden;
            transition: transform 0.5s, box-shadow 0.5s, border-color 0.5s;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(255, 103, 0, 0.25);
            border-color: rgba(255, 103, 0, 0.3);
        }

        .menu-card-image {
            position: relative;
            height: 200px;
            overflow: hidden;
        }

        .menu-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s;
        }

        .menu-card:hover .menu-card-image img {
            transform: scale(1.1);
        }

        .menu-card-price {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.375rem 0.75rem;
            background: rgba(255, 103, 0, 0.9);
            border-radius: 9999px;
            color: white;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .menu-card-content {
            padding: 1.5rem;
        }

        .menu-card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-cream);
            margin-bottom: 0.5rem;
            transition: color 0.3s;
        }

        .menu-card:hover .menu-card-title {
            color: var(--accent);
        }

        .menu-card-description {
            font-size: 0.875rem;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Gallery Section */
        .gallery {
            background: linear-gradient(180deg, var(--bg-dark) 0%, rgba(11, 61, 46, 0.15) 50%, var(--bg-dark) 100%);
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .gallery-header .section-description {
            margin: 0 auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 0.75rem;
            cursor: pointer;
            aspect-ratio: 1;
        }

        .gallery-item.tall {
            grid-row: span 2;
            aspect-ratio: auto;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-item-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0);
            display: flex;
            flex-direction: column;
            align-items: center;
